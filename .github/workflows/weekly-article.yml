name: Weekly Agentic Article

# Drafts a weekly Greek-language editorial article via the Anthropic API,
# anchored on today's saints and the current news feed. Output is written
# with `draft: true` and pushed to a branch (NOT main) so the user reviews
# and merges before it goes live.
#
# ACTIVATION (one-time setup before this workflow does anything useful):
#   1. Add repo secret ANTHROPIC_API_KEY (Settings → Secrets → Actions)
#   2. Run once via "Run workflow" button to verify
#   3. Uncomment the schedule block below to enable automatic weekly runs
#
# Cost: ~$0.05–0.20 per run with Sonnet (the default).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model size (sonnet | opus | haiku)'
        required: false
        default: 'sonnet'
  # Uncomment to enable weekly auto-drafting (Mondays 04:00 UTC,
  # after daily-saints has run and the new commemorations are committed):
  # schedule:
  #   - cron: '0 4 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-article
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Draft article via Anthropic API
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python draft_agentic_article.py --model ${{ inputs.model || 'sonnet' }}

      - name: Detect changes
        id: changes
        run: |
          if [[ -z "$(git status --porcelain src/content/articles/)" ]]; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            echo "No new article generated."
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with the draft
        if: steps.changes.outputs.changed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ts=$(date -u +%Y-%m-%d)
          branch="agentic-article/${ts}"
          git config user.name "orthodox-article-bot"
          git config user.email "noreply@orthodox-site.pages.dev"
          git checkout -b "$branch"
          git add src/content/articles/
          git commit -m "draft(article): agentic weekly draft (${ts})"
          git push -u origin "$branch"
          gh pr create \
            --title "draft(article): agentic weekly draft (${ts})" \
            --body "Auto-generated by weekly-article workflow. Review for accuracy, tone, and theological soundness, then remove \`draft: true\` and merge — or close this PR if the draft is unusable." \
            --base main \
            --head "$branch"

      - name: Summary
        run: |
          echo "## Weekly article draft" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "1" ]]; then
            echo "- ✅ Draft pushed to branch and PR opened." >> $GITHUB_STEP_SUMMARY
            echo "- Review at: https://github.com/${{ github.repository }}/pulls" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No draft produced (model may have refused or returned empty)." >> $GITHUB_STEP_SUMMARY
          fi
