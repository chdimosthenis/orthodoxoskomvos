name: News Aggregator

# RSS-only news fetcher. NO Anthropic API, NO third-party paid service —
# pure feedparser scrape of public Greek Orthodox news outlets.
# The fetcher writes BOTH:
#   src/data/news.json            ← latest snapshot (home-page widget)
#   src/data/news/YYYY-MM-DD.json ← dated archive (browsable at /news/archive)
# A second run on the same day MERGES new items into that day's archive.

on:
  schedule:
    # Every 6 hours — 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '5 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news-aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news from RSS sources
        working-directory: scripts
        run: python fetch_news.py --limit 30

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet src/data/ 2>/dev/null; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            echo "No new news items."
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
            echo "News refreshed."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == '1'
        run: |
          git config user.name "orthodox-news-bot"
          git config user.email "noreply@orthodoxoskomvos.gr"
          git add src/data/news.json src/data/news/
          ts=$(date -u +%Y-%m-%dT%H:%MZ)
          today=$(date -u +%Y-%m-%d)
          git commit -m "chore(news): refresh aggregated feed (${ts}) [archive ${today}]"
          # Tolerate concurrent pushes from human work — rebase + retry once.
          git pull --rebase origin main || true
          git push

      - name: Summary
        run: |
          echo "## News aggregator run" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "1" ]]; then
            echo "- ✅ news.json + dated archive updated and pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No changes since last run" >> $GITHUB_STEP_SUMMARY
          fi
